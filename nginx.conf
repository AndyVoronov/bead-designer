# Bead Designer — Nginx reverse proxy for Next.js
# Placeholders: _DOMAIN_, _APP_PATH_ (replaced by deploy.sh)

# Additional gzip types (gzip on already set in /etc/nginx/nginx.conf)
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 256;
gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/json
    application/javascript
    application/xml
    application/rss+xml
    image/svg+xml;

# HTTP server (upgrade to HTTPS block after running certbot)
server {
    listen 80;
    listen [::]:80;
    server_name _DOMAIN_;

    # Proxy to Next.js standalone server
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Disable Nginx buffering for Next.js streaming responses (SSR, RSC)
        proxy_buffering off;
        add_header X-Accel-Buffering no;
    }

    # Cache Next.js static assets aggressively
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "public, immutable";
        expires 365d;
    }
}
