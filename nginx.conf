# Bead Designer — Nginx reverse proxy for Next.js

# Trust proxy headers for real client IP (needed for rate limiting)
set_real_ip_from 127.0.0.1;
set_real_ip_from ::1;
real_ip_header X-Forwarded-For;
real_ip_recursive on;

# Gzip settings (may be inherited from main nginx.conf)
# gzip_vary on;
# gzip_proxied any;
# gzip_comp_level 6;
# gzip_min_length 256;
# gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml application/rss+xml image/svg+xml;

# HTTP — ACME challenge + redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name thekidsdream.ru www.thekidsdream.ru 5minutesofsilence.ru www.5minutesofsilence.ru;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — thekidsdream.ru
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name thekidsdream.ru www.thekidsdream.ru;

    ssl_certificate /etc/letsencrypt/live/thekidsdream.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/thekidsdream.ru/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        add_header X-Accel-Buffering no;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    }

    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "public, immutable";
        expires 365d;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Static uploads — serve directly from disk, bypass Next.js
    location /api/uploads/ {
        alias /var/www/toydesigner/uploads/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;

        add_header X-Content-Type-Options "nosniff" always;
    }
}

# HTTPS — 5minutesofsilence.ru
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name 5minutesofsilence.ru www.5minutesofsilence.ru;

    ssl_certificate /etc/letsencrypt/live/5minutesofsilence.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/5minutesofsilence.ru/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Long-running API routes (article generation, etc.)
    location /api/admin/blog/generate {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 600s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_buffering off;
        add_header X-Accel-Buffering no;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
